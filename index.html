<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一元线性回归分析仪</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #faf9f6;
  --surface: #ffffff;
  --surface2: #f3f1ec;
  --border: #e2ddd6;
  --border2: #ccc8c0;
  --ink: #1c1a17;
  --ink2: #6b6560;
  --ink3: #a09a93;
  --red: #c0392b;
  --blue: #2563a8;
  --green: #1a7a4a;
  --amber: #92600a;
  --accent: #c0392b;
  --serif: 'DM Serif Display', 'Noto Sans SC', Georgia, serif;
  --mono: 'DM Mono', 'Courier New', monospace;
  --sans: 'Noto Sans SC', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--sans);
  min-height: 100vh;
}

/* Subtle paper texture */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
}

.wrap {
  position: relative;
  z-index: 1;
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 32px 80px;
}

/* ── Header ── */
header {
  padding: 52px 0 40px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 48px;
}

.header-eyebrow {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 12px;
}

header h1 {
  font-family: var(--serif);
  font-size: 48px;
  line-height: 1.05;
  color: var(--ink);
  font-weight: 400;
}

header h1 em {
  font-style: italic;
  color: var(--accent);
}

.header-sub {
  margin-top: 16px;
  font-size: 14px;
  color: var(--ink2);
  line-height: 1.7;
  max-width: 560px;
}

/* ── Upload zone ── */
.upload-zone {
  border: 2px dashed var(--border2);
  border-radius: 4px;
  padding: 48px 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--surface);
  position: relative;
  margin-bottom: 32px;
}

.upload-zone:hover, .upload-zone.dragover {
  border-color: var(--accent);
  background: #fdf5f4;
}

.upload-icon {
  font-size: 40px;
  margin-bottom: 16px;
  display: block;
  opacity: 0.6;
}

.upload-title {
  font-family: var(--serif);
  font-size: 22px;
  color: var(--ink);
  margin-bottom: 8px;
  font-weight: 400;
}

.upload-hint {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--ink3);
  letter-spacing: 0.5px;
}

#fileInput { display: none; }

/* ── Column selector ── */
.col-select-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px;
  margin-bottom: 28px;
  display: none;
}

.section-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.col-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

@media (max-width: 600px) { .col-grid { grid-template-columns: 1fr; } }

label.field-label {
  display: block;
  font-size: 12px;
  color: var(--ink2);
  margin-bottom: 6px;
  font-family: var(--mono);
  letter-spacing: 0.5px;
}

select, input[type="number"] {
  width: 100%;
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 10px 12px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--ink);
  background: var(--bg);
  outline: none;
  transition: border-color 0.15s;
  cursor: pointer;
}

select:focus, input:focus { border-color: var(--accent); }

.btn-run {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 13px 32px;
  background: var(--ink);
  color: #faf9f6;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  border: none;
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.15s;
}

.btn-run:hover {
  background: var(--accent);
  transform: translateY(-1px);
  box-shadow: 0 4px 16px rgba(192,57,43,0.2);
}

/* ── Preview table ── */
.preview-wrap {
  margin-bottom: 28px;
  display: none;
}

.preview-scroll {
  overflow-x: auto;
  border: 1px solid var(--border);
  border-radius: 4px;
}

table.preview-tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-family: var(--mono);
}

.preview-tbl th {
  background: var(--surface2);
  padding: 9px 14px;
  text-align: left;
  border-bottom: 1px solid var(--border2);
  color: var(--ink2);
  font-weight: 500;
  white-space: nowrap;
}

.preview-tbl td {
  padding: 7px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--ink);
  white-space: nowrap;
}

.preview-tbl tr:last-child td { border-bottom: none; }
.preview-tbl tr:hover td { background: var(--surface2); }

/* ── Results ── */
#results { display: none; }

.results-header {
  font-family: var(--serif);
  font-size: 32px;
  font-weight: 400;
  margin-bottom: 32px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border2);
  color: var(--ink);
}

.results-header span { color: var(--accent); font-style: italic; }

/* Equation display */
.equation-box {
  background: var(--ink);
  color: #faf9f6;
  border-radius: 4px;
  padding: 32px 36px;
  margin-bottom: 28px;
  font-family: var(--serif);
}

.eq-label {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 3px;
  color: #9a9590;
  text-transform: uppercase;
  margin-bottom: 16px;
}

.eq-formula {
  font-size: 30px;
  letter-spacing: 1px;
  line-height: 1.4;
}

.eq-formula .coeff { color: #e88a7a; font-style: italic; }
.eq-formula .var { color: #7ab8e8; font-style: italic; }

/* Stats grid */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}

@media (max-width: 700px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 20px 18px;
  position: relative;
  overflow: hidden;
}

.stat-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}

.stat-card.good::before { background: var(--green); }
.stat-card.warn::before { background: var(--amber); }
.stat-card.bad::before { background: var(--red); }
.stat-card.info::before { background: var(--blue); }

.stat-name {
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 10px;
}

.stat-val {
  font-family: var(--serif);
  font-size: 28px;
  color: var(--ink);
  line-height: 1;
  font-weight: 400;
  margin-bottom: 6px;
}

.stat-desc {
  font-size: 11px;
  color: var(--ink2);
  line-height: 1.5;
}

/* Two-column layout for charts + tables */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}

@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

.panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 24px;
}

.panel-title {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--ink2);
  text-transform: uppercase;
  margin-bottom: 18px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}

canvas {
  width: 100% !important;
  height: 260px !important;
}

/* ANOVA table */
table.anova-tbl {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  font-family: var(--mono);
}

.anova-tbl th {
  text-align: left;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border2);
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--ink3);
  font-weight: 500;
  text-transform: uppercase;
}

.anova-tbl td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  color: var(--ink);
}

.anova-tbl tr:last-child td { border-bottom: none; }
.anova-tbl .highlight { color: var(--accent); font-weight: 500; }

/* Verdict */
.verdict-box {
  border-radius: 4px;
  padding: 24px 28px;
  margin-bottom: 28px;
  border-left: 4px solid;
}

.verdict-box.pass { background: #f0faf4; border-color: var(--green); }
.verdict-box.warn { background: #fdf8f0; border-color: var(--amber); }
.verdict-box.fail { background: #fdf3f2; border-color: var(--red); }

.verdict-title {
  font-family: var(--serif);
  font-size: 18px;
  font-weight: 400;
  margin-bottom: 10px;
}

.verdict-body {
  font-size: 13px;
  color: var(--ink2);
  line-height: 1.8;
}

/* Prediction */
.predict-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 28px;
  margin-bottom: 28px;
  display: none;
}

.predict-row {
  display: flex;
  align-items: flex-end;
  gap: 16px;
  flex-wrap: wrap;
}

.predict-row .field-wrap { flex: 1; min-width: 180px; }

.predict-output {
  margin-top: 20px;
  padding: 18px 22px;
  background: var(--surface2);
  border-radius: 3px;
  font-family: var(--serif);
  font-size: 22px;
  display: none;
}

.predict-output .pred-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 1.5px;
  color: var(--ink3);
  text-transform: uppercase;
  margin-bottom: 8px;
  font-size: 10px;
  display: block;
}

/* Footnote */
.footnote {
  font-size: 11px;
  color: var(--ink3);
  line-height: 1.9;
  font-family: var(--mono);
  border-top: 1px solid var(--border);
  padding-top: 20px;
  margin-top: 32px;
}

/* Anim */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.anim { animation: fadeUp 0.4s ease both; }

.full-panel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 24px;
  margin-bottom: 20px;
}

</style>
</head>
<body>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="header-eyebrow">Statistical Analysis Tool</div>
    <h1>一元线性<em>回归</em>分析仪</h1>
    <p class="header-sub">上传 Excel 文件，自动完成回归方程拟合、R² 判定、F检验、t检验、残差诊断及因变量预测。</p>
  </header>

  <!-- Upload -->
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    <span class="upload-icon">📊</span>
    <div class="upload-title">拖拽或点击上传 Excel 文件</div>
    <div class="upload-hint">支持 .xlsx · .xls · .csv &nbsp;｜&nbsp; 文件在本地处理，不上传服务器</div>
    <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
  </div>

  <!-- Column selector -->
  <div class="col-select-wrap" id="colSelectWrap">
    <div class="section-label">选择变量列</div>
    <div class="col-grid">
      <div>
        <label class="field-label">自变量 X（解释变量）</label>
        <select id="colX"></select>
      </div>
      <div>
        <label class="field-label">因变量 Y（响应变量）</label>
        <select id="colY"></select>
      </div>
    </div>
    <button class="btn-run" onclick="runRegression()">▶ &nbsp;运行回归分析</button>
  </div>

  <!-- Data preview -->
  <div class="preview-wrap" id="previewWrap">
    <div class="section-label">数据预览（前 8 行）</div>
    <div class="preview-scroll">
      <table class="preview-tbl" id="previewTbl"></table>
    </div>
  </div>

  <!-- Results -->
  <div id="results">

    <!-- Verdict -->
    <div id="verdictBox" class="verdict-box anim"></div>

    <!-- Equation -->
    <div class="equation-box anim">
      <div class="eq-label">拟合回归方程</div>
      <div class="eq-formula" id="eqDisplay"></div>
    </div>

    <!-- Key stats -->
    <div class="stats-grid anim" id="statsGrid"></div>

    <!-- Charts row -->
    <div class="two-col anim">
      <div class="panel">
        <div class="panel-title">散点图 &amp; 回归直线</div>
        <canvas id="chartScatter"></canvas>
      </div>
      <div class="panel">
        <div class="panel-title">残差分布图</div>
        <canvas id="chartResid"></canvas>
      </div>
    </div>

    <!-- Residual histogram -->
    <div class="two-col anim">
      <div class="panel">
        <div class="panel-title">残差直方图</div>
        <canvas id="chartHist"></canvas>
      </div>
      <div class="panel">
        <div class="panel-title">预测值 vs 实际值</div>
        <canvas id="chartPvA"></canvas>
      </div>
    </div>

    <!-- ANOVA table -->
    <div class="full-panel anim">
      <div class="panel-title">方差分析表（ANOVA）&amp; 系数检验</div>
      <div style="overflow-x:auto">
        <table class="anova-tbl" id="anovaTable"></table>
      </div>
    </div>

    <!-- Prediction -->
    <div class="predict-wrap" id="predictWrap">
      <div class="section-label">因变量预测</div>
      <div class="predict-row">
        <div class="field-wrap">
          <label class="field-label">输入自变量 X 值</label>
          <input type="number" id="predX" placeholder="输入 X 值" oninput="doPred()">
        </div>
      </div>
      <div class="predict-output" id="predOutput">
        <span class="pred-label">预测值 Ŷ</span>
        <span id="predVal"></span>
      </div>
    </div>

    <div class="footnote" id="footnote"></div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ── File handling ──────────────────────────────────────────────
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');
let rawData = [], headers = [];

uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => handleFile(e.target.files[0]));

function handleFile(file) {
  if (!file) return;
  const reader = new FileReader();
  const isCsv = file.name.endsWith('.csv');

  reader.onload = e => {
    let wb;
    if (isCsv) {
      wb = XLSX.read(e.target.result, { type: 'string' });
    } else {
      wb = XLSX.read(e.target.result, { type: 'binary' });
    }
    const ws = wb.Sheets[wb.SheetNames[0]];
    const json = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

    headers = json[0].map(String);
    rawData = json.slice(1).filter(r => r.some(c => c !== ''));

    buildColSelectors();
    buildPreview();
    document.getElementById('colSelectWrap').style.display = 'block';
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('results').style.display = 'none';
    uploadZone.style.borderStyle = 'solid';
    uploadZone.style.borderColor = 'var(--green)';
    uploadZone.querySelector('.upload-title').textContent = '✓ ' + file.name;
  };

  if (isCsv) reader.readAsText(file);
  else reader.readAsBinaryString(file);
}

function buildColSelectors() {
  ['colX','colY'].forEach((id, i) => {
    const sel = document.getElementById(id);
    sel.innerHTML = headers.map((h,j) =>
      `<option value="${j}" ${j===i?'selected':''}>${h}</option>`
    ).join('');
  });
}

function buildPreview() {
  const tbl = document.getElementById('previewTbl');
  const rows = rawData.slice(0, 8);
  tbl.innerHTML =
    `<thead><tr>${headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>` +
    `<tbody>${rows.map(r=>`<tr>${headers.map((_,j)=>`<td>${r[j]??''}</td>`).join('')}</tr>`).join('')}</tbody>`;
}

// ── Regression Engine ──────────────────────────────────────────
let regResult = null;
let chartInstances = {};

function runRegression() {
  const xi = parseInt(document.getElementById('colX').value);
  const yi = parseInt(document.getElementById('colY').value);

  const pairs = rawData
    .map(r => [parseFloat(r[xi]), parseFloat(r[yi])])
    .filter(([x,y]) => !isNaN(x) && !isNaN(y));

  if (pairs.length < 3) { alert('有效数据点不足（至少需要3行）'); return; }

  const xs = pairs.map(p=>p[0]), ys = pairs.map(p=>p[1]);
  const n = xs.length;

  const mean = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
  const xbar = mean(xs), ybar = mean(ys);

  const Sxx = xs.reduce((s,x)=>s+(x-xbar)**2, 0);
  const Sxy = xs.reduce((s,x,i)=>s+(x-xbar)*(ys[i]-ybar), 0);
  const Syy = ys.reduce((s,y)=>s+(y-ybar)**2, 0);

  const b1 = Sxy / Sxx;          // slope
  const b0 = ybar - b1 * xbar;   // intercept

  const yhat = xs.map(x => b0 + b1*x);
  const resid = ys.map((y,i) => y - yhat[i]);

  // RSS, TSS, ESS
  const RSS = resid.reduce((s,r)=>s+r**2, 0);
  const TSS = Syy;
  const ESS = TSS - RSS;

  const R2 = ESS / TSS;
  const R2adj = 1 - (1-R2)*(n-1)/(n-2);

  // Standard error of regression
  const se = Math.sqrt(RSS / (n-2));

  // SE of coefficients
  const se_b1 = se / Math.sqrt(Sxx);
  const se_b0 = se * Math.sqrt(xs.reduce((s,x)=>s+x**2,0) / (n*Sxx));

  // t-stats
  const t_b1 = b1 / se_b1;
  const t_b0 = b0 / se_b0;

  // F-stat
  const MSR = ESS / 1;
  const MSE = RSS / (n-2);
  const F = MSR / MSE;

  // p-value approximation (t-distribution)
  function tCDF(t, df) {
    const x = df / (df + t*t);
    return 1 - 0.5 * incompleteBeta(df/2, 0.5, x);
  }

  function incompleteBeta(a, b, x) {
    if (x < 0 || x > 1) return 0;
    if (x === 0) return 0;
    if (x === 1) return 1;
    const lbeta = lgamma(a) + lgamma(b) - lgamma(a+b);
    const front = Math.exp(Math.log(x)*a + Math.log(1-x)*b - lbeta) / a;
    return front * betaCF(a, b, x);
  }

  function betaCF(a, b, x) {
    const MAXIT = 100, EPS = 3e-7;
    let qab = a+b, qap = a+1, qam = a-1;
    let c=1, d=1-qab*x/qap; if(Math.abs(d)<1e-30)d=1e-30; d=1/d;
    let h=d;
    for(let m=1;m<=MAXIT;m++){
      let m2=2*m;
      let aa=m*(b-m)*x/((qam+m2)*(a+m2));
      d=1+aa*d; if(Math.abs(d)<1e-30)d=1e-30;
      c=1+aa/c; if(Math.abs(c)<1e-30)c=1e-30;
      d=1/d; h*=d*c;
      aa=-(a+m)*(qab+m)*x/((a+m2)*(qap+m2));
      d=1+aa*d; if(Math.abs(d)<1e-30)d=1e-30;
      c=1+aa/c; if(Math.abs(c)<1e-30)c=1e-30;
      d=1/d; let del=d*c; h*=del;
      if(Math.abs(del-1)<EPS)break;
    }
    return h;
  }

  function lgamma(x) {
    const c = [76.18009172947146,-86.50532032941677,24.01409824083091,
                -1.231739572450155,0.1208650973866179e-2,-0.5395239384953e-5];
    let y=x, tmp=x+5.5;
    tmp=(x+0.5)*Math.log(tmp)-tmp;
    let ser=1.000000000190015;
    for(let i=0;i<6;i++){ y+=1; ser+=c[i]/y; }
    return tmp+Math.log(2.5066282746310005*ser/x);
  }

  function pFromT(t, df) { return 2*(1-tCDF(Math.abs(t), df)); }
  function pFromF(f, df1, df2) {
    const x = df2/(df2+df1*f);
    return incompleteBeta(df2/2, df1/2, x);
  }

  const p_b1 = pFromT(t_b1, n-2);
  const p_b0 = pFromT(t_b0, n-2);
  const p_F  = pFromF(F, 1, n-2);

  regResult = { b0, b1, R2, R2adj, se, se_b1, se_b0,
                t_b1, t_b0, p_b1, p_b0, F, p_F,
                n, RSS, ESS, TSS, MSR, MSE,
                xs, ys, yhat, resid, xbar, ybar,
                xname: headers[xi], yname: headers[yi] };

  renderResults(regResult);
}

// ── Render ─────────────────────────────────────────────────────
function fmt(n, d=4) {
  if (isNaN(n)||n===null) return '—';
  const v = parseFloat(n.toFixed(d));
  return v.toString();
}
function fmtP(p) {
  if (p < 0.001) return '< 0.001';
  return p.toFixed(4);
}
function fmtSig(p) {
  if (p < 0.001) return '***';
  if (p < 0.01)  return '**';
  if (p < 0.05)  return '*';
  if (p < 0.1)   return '†';
  return 'ns';
}

function renderResults(r) {
  document.getElementById('results').style.display = 'block';

  // Equation
  const s = r.b1 >= 0 ? '+' : '';
  document.getElementById('eqDisplay').innerHTML =
    `<span class="var">Ŷ</span> &nbsp;=&nbsp; <span class="coeff">${fmt(r.b0,4)}</span> &nbsp;${s}&nbsp; <span class="coeff">${fmt(r.b1,4)}</span> &nbsp;&middot;&nbsp; <span class="var">${escHtml(r.xname)}</span>`;

  // Verdict
  const isF_sig = r.p_F < 0.05;
  const isT_sig = r.p_b1 < 0.05;
  const r2level = r.R2 >= 0.7 ? 'good' : r.R2 >= 0.4 ? 'warn' : 'poor';
  let vClass, vTitle, vBody;
  if (isF_sig && isT_sig && r.R2 >= 0.6) {
    vClass='pass'; vTitle='✅ 回归方程显著，拟合效果良好';
    vBody=`F检验（F=${fmt(r.F,3)}, p=${fmtP(r.p_F)}）和t检验均显著，回归方程整体有统计意义。R²=${fmt(r.R2,4)} 说明自变量解释了因变量 ${(r.R2*100).toFixed(1)}% 的变异，模型拟合效果较好。`;
  } else if (isF_sig && isT_sig) {
    vClass='warn'; vTitle='⚠️ 回归方程显著，但拟合度有限';
    vBody=`F检验（F=${fmt(r.F,3)}, p=${fmtP(r.p_F)}）显著，线性关系存在，但 R²=${fmt(r.R2,4)} 较低，模型仅解释了 ${(r.R2*100).toFixed(1)}% 的变异。建议检查是否存在非线性关系，或引入更多变量。`;
  } else {
    vClass='fail'; vTitle='❌ 回归方程不显著';
    vBody=`F检验（F=${fmt(r.F,3)}, p=${fmtP(r.p_F)}）不显著（p ≥ 0.05），当前证据不足以支持自变量与因变量之间存在显著线性关系。请检查数据质量或考虑其他模型形式。`;
  }
  const vb = document.getElementById('verdictBox');
  vb.className = `verdict-box ${vClass} anim`;
  vb.innerHTML = `<div class="verdict-title">${vTitle}</div><div class="verdict-body">${vBody}</div>`;

  // Stat cards
  const R2cls = r.R2>=0.7?'good':r.R2>=0.4?'warn':'bad';
  const Fcls  = r.p_F<0.05?'good':'bad';
  const tcls  = r.p_b1<0.05?'good':'bad';
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card ${R2cls}">
      <div class="stat-name">R² 判定系数</div>
      <div class="stat-val">${fmt(r.R2,4)}</div>
      <div class="stat-desc">模型解释了 ${(r.R2*100).toFixed(1)}% 的因变量变异</div>
    </div>
    <div class="stat-card ${R2cls}">
      <div class="stat-name">调整后 R²</div>
      <div class="stat-val">${fmt(r.R2adj,4)}</div>
      <div class="stat-desc">修正样本量影响后的拟合度</div>
    </div>
    <div class="stat-card ${Fcls}">
      <div class="stat-name">F 检验统计量</div>
      <div class="stat-val">${fmt(r.F,3)}</div>
      <div class="stat-desc">p = ${fmtP(r.p_F)} &nbsp; ${fmtSig(r.p_F)}</div>
    </div>
    <div class="stat-card info">
      <div class="stat-name">估计标准误差 Se</div>
      <div class="stat-val">${fmt(r.se,4)}</div>
      <div class="stat-desc">残差标准差，n = ${r.n}</div>
    </div>
  `;

  // ANOVA table
  document.getElementById('anovaTable').innerHTML = `
    <thead>
      <tr>
        <th>来源</th><th>平方和 SS</th><th>自由度 df</th>
        <th>均方 MS</th><th>F 值</th><th>P 值</th><th>显著性</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>回归（ESS）</td>
        <td>${fmt(r.ESS,4)}</td><td>1</td>
        <td>${fmt(r.MSR,4)}</td>
        <td class="highlight">${fmt(r.F,4)}</td>
        <td class="highlight">${fmtP(r.p_F)}</td>
        <td>${fmtSig(r.p_F)}</td>
      </tr>
      <tr>
        <td>残差（RSS）</td>
        <td>${fmt(r.RSS,4)}</td><td>${r.n-2}</td>
        <td>${fmt(r.MSE,4)}</td>
        <td>—</td><td>—</td><td>—</td>
      </tr>
      <tr>
        <td>总计（TSS）</td>
        <td>${fmt(r.TSS,4)}</td><td>${r.n-1}</td>
        <td>—</td><td>—</td><td>—</td><td>—</td>
      </tr>
    </tbody>
    <thead style="border-top:2px solid var(--border2)">
      <tr>
        <th>系数</th><th>估计值</th><th>标准误差 SE</th>
        <th>t 统计量</th><th>P 值</th><th colspan="2">显著性</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>截距 β₀</td>
        <td>${fmt(r.b0,6)}</td>
        <td>${fmt(r.se_b0,6)}</td>
        <td>${fmt(r.t_b0,4)}</td>
        <td>${fmtP(r.p_b0)}</td>
        <td colspan="2">${fmtSig(r.p_b0)}</td>
      </tr>
      <tr>
        <td>${escHtml(r.xname)} (β₁)</td>
        <td class="highlight">${fmt(r.b1,6)}</td>
        <td>${fmt(r.se_b1,6)}</td>
        <td class="highlight">${fmt(r.t_b1,4)}</td>
        <td class="highlight">${fmtP(r.p_b1)}</td>
        <td colspan="2">${fmtSig(r.p_b1)}</td>
      </tr>
    </tbody>
    <tfoot>
      <tr><td colspan="7" style="padding:10px 12px;font-size:10px;color:var(--ink3)">
        显著性编码：*** p&lt;0.001 &nbsp; ** p&lt;0.01 &nbsp; * p&lt;0.05 &nbsp; † p&lt;0.1 &nbsp; ns 不显著
      </td></tr>
    </tfoot>
  `;

  drawCharts(r);

  document.getElementById('predictWrap').style.display = 'block';
  document.getElementById('predOutput').style.display = 'none';

  document.getElementById('footnote').innerHTML =
    `※ 回归方程：${escHtml(r.yname)} = ${fmt(r.b0,4)} ${r.b1>=0?'+':''} ${fmt(r.b1,4)} × ${escHtml(r.xname)}<br>
     ※ 所有检验基于最小二乘法（OLS）·双侧 t 检验 · 自由度 df = ${r.n-2}<br>
     ※ R² 越接近 1 说明拟合越好；残差应随机分布（无明显规律）`;

  document.getElementById('results').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function drawCharts(r) {
  // Destroy old
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};

  const POINT_COLOR = 'rgba(44, 99, 168, 0.65)';
  const LINE_COLOR  = '#c0392b';
  const RESID_COLOR = 'rgba(26,122,74,0.7)';
  const ZERO_COLOR  = '#aaa';

  const baseOpts = {
    animation: { duration: 600, easing: 'easeInOutQuart' },
    plugins: { legend: { display: false }, tooltip: { mode: 'index', intersect: false,
      titleFont: { family: 'DM Mono' }, bodyFont: { family: 'DM Mono' } } },
    scales: {
      x: { grid: { color: '#f0ede8' }, ticks: { font: { family: 'DM Mono', size: 10 }, color: '#9a9590' } },
      y: { grid: { color: '#f0ede8' }, ticks: { font: { family: 'DM Mono', size: 10 }, color: '#9a9590' } }
    }
  };

  // 1. Scatter + regression line
  const xSorted = [...r.xs].sort((a,b)=>a-b);
  const lineData = xSorted.map(x => ({ x, y: r.b0 + r.b1*x }));

  chartInstances.scatter = new Chart(document.getElementById('chartScatter'), {
    type: 'scatter',
    data: {
      datasets: [
        { label: '观测值', data: r.xs.map((x,i)=>({x,y:r.ys[i]})),
          backgroundColor: POINT_COLOR, pointRadius: 5, pointHoverRadius: 7, order: 2 },
        { label: '回归线', data: lineData, type: 'line',
          borderColor: LINE_COLOR, borderWidth: 2, pointRadius: 0, tension: 0, fill: false, order: 1 }
      ]
    },
    options: { ...baseOpts,
      scales: { ...baseOpts.scales,
        x: { ...baseOpts.scales.x, title: { display: true, text: r.xname, font: { family: 'DM Mono', size: 11 } } },
        y: { ...baseOpts.scales.y, title: { display: true, text: r.yname, font: { family: 'DM Mono', size: 11 } } }
      }
    }
  });

  // 2. Residual plot (resid vs yhat)
  chartInstances.resid = new Chart(document.getElementById('chartResid'), {
    type: 'scatter',
    data: {
      datasets: [
        { label: '残差', data: r.yhat.map((yh,i)=>({x:yh,y:r.resid[i]})),
          backgroundColor: RESID_COLOR, pointRadius: 5, pointHoverRadius: 7 },
        { label: '零线', data: [{x:Math.min(...r.yhat),y:0},{x:Math.max(...r.yhat),y:0}],
          type: 'line', borderColor: ZERO_COLOR, borderWidth: 1.5, borderDash: [6,4], pointRadius: 0, fill: false }
      ]
    },
    options: { ...baseOpts,
      scales: { ...baseOpts.scales,
        x: { ...baseOpts.scales.x, title: { display: true, text: '拟合值 Ŷ', font: { family: 'DM Mono', size: 11 } } },
        y: { ...baseOpts.scales.y, title: { display: true, text: '残差', font: { family: 'DM Mono', size: 11 } } }
      }
    }
  });

  // 3. Residual histogram
  const bins = 10;
  const rmin = Math.min(...r.resid), rmax = Math.max(...r.resid);
  const bw = (rmax - rmin) / bins || 1;
  const counts = Array(bins).fill(0);
  r.resid.forEach(v => {
    let i = Math.floor((v - rmin) / bw);
    if (i >= bins) i = bins-1;
    counts[i]++;
  });
  const binLabels = counts.map((_,i) => fmt(rmin + (i+0.5)*bw, 2));

  chartInstances.hist = new Chart(document.getElementById('chartHist'), {
    type: 'bar',
    data: {
      labels: binLabels,
      datasets: [{ label: '频次', data: counts,
        backgroundColor: 'rgba(26,122,74,0.5)', borderColor: 'rgba(26,122,74,0.9)', borderWidth: 1 }]
    },
    options: { ...baseOpts,
      scales: { ...baseOpts.scales,
        x: { ...baseOpts.scales.x, title: { display: true, text: '残差区间', font: { family: 'DM Mono', size: 11 } } },
        y: { ...baseOpts.scales.y, title: { display: true, text: '频次', font: { family: 'DM Mono', size: 11 } } }
      },
      plugins: { ...baseOpts.plugins, legend: { display: false } }
    }
  });

  // 4. Predicted vs Actual
  const diagMin = Math.min(Math.min(...r.ys), Math.min(...r.yhat));
  const diagMax = Math.max(Math.max(...r.ys), Math.max(...r.yhat));
  chartInstances.pva = new Chart(document.getElementById('chartPvA'), {
    type: 'scatter',
    data: {
      datasets: [
        { label: '预测 vs 实际', data: r.ys.map((y,i)=>({x:y,y:r.yhat[i]})),
          backgroundColor: 'rgba(44,99,168,0.6)', pointRadius: 5, pointHoverRadius: 7, order: 2 },
        { label: '完美预测线', data: [{x:diagMin,y:diagMin},{x:diagMax,y:diagMax}],
          type: 'line', borderColor: LINE_COLOR, borderWidth: 1.5, borderDash: [6,4], pointRadius: 0, fill: false, order: 1 }
      ]
    },
    options: { ...baseOpts,
      scales: { ...baseOpts.scales,
        x: { ...baseOpts.scales.x, title: { display: true, text: '实际值 Y', font: { family: 'DM Mono', size: 11 } } },
        y: { ...baseOpts.scales.y, title: { display: true, text: '预测值 Ŷ', font: { family: 'DM Mono', size: 11 } } }
      }
    }
  });
}

// ── Prediction ──────────────────────────────────────────────────
function doPred() {
  if (!regResult) return;
  const xv = parseFloat(document.getElementById('predX').value);
  const out = document.getElementById('predOutput');
  if (isNaN(xv)) { out.style.display = 'none'; return; }
  const yv = regResult.b0 + regResult.b1 * xv;
  document.getElementById('predVal').textContent =
    `${fmt(yv, 4)} &nbsp; （X = ${xv}）`;
  document.getElementById('predVal').innerHTML =
    `<strong>${fmt(yv,4)}</strong> &emsp; <span style="font-size:16px;color:var(--ink2);font-family:var(--mono)">（当 ${escHtml(regResult.xname)} = ${xv}）</span>`;
  out.style.display = 'block';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
